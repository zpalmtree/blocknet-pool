global:
  resolve_timeout: 5m

route:
  receiver: discord-relay
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: discord-relay
    webhook_configs:
      - url: http://127.0.0.1:24810/webhook
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
