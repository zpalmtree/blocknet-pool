global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    pool: bntpool

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: blocknet_pool_monitor
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:24784

  - job_name: node_exporter
    static_configs:
      - targets:
          - 127.0.0.1:9100

  - job_name: blackbox_http_public
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - https://bntpool.com/api/monitor/public
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: blackbox_tcp_stratum
    metrics_path: /probe
    params:
      module:
        - tcp_connect
    static_configs:
      - targets:
          - 127.0.0.1:3333
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115
